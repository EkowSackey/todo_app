name: Build and Push to ECR

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ENV_NAME: prod
  APP_NAME: todo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73 # v4.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

      - name: Build and push Docker image
        env:
          ECR_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ENV_NAME }}/${{ env.APP_NAME }}
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          docker build -t $ECR_URI:$IMAGE_TAG -t $ECR_URI:latest .
          docker push $ECR_URI:$IMAGE_TAG
          docker push $ECR_URI:latest

      - name: Resolve SSM values for deploy bundle
        id: resolve
        run: |
          DB_SECRET_ARN=$(aws ssm get-parameter \
            --name /todo/${{ env.ENV_NAME }}/db-secret-arn \
            --query Parameter.Value \
            --output text)
          ARTIFACTS_BUCKET=$(aws ssm get-parameter \
            --name /todo/${{ env.ENV_NAME }}/artifacts-bucket-name \
            --query Parameter.Value \
            --output text)
          echo "db_secret_arn=${DB_SECRET_ARN}" >> $GITHUB_OUTPUT
          echo "artifacts_bucket=${ARTIFACTS_BUCKET}" >> $GITHUB_OUTPUT

      - name: Prepare and upload deploy bundle
        env:
          DB_SECRET_ARN: ${{ steps.resolve.outputs.db_secret_arn }}
          ARTIFACTS_BUCKET: ${{ steps.resolve.outputs.artifacts_bucket }}
        run: |
          sed \
            -e "s|<EXECUTION_ROLE_ARN>|${{ secrets.EXECUTION_ROLE_ARN }}|g" \
            -e "s|<TASK_ROLE_ARN>|${{ secrets.TASK_ROLE_ARN }}|g" \
            -e "s|<DB_SECRET_ARN>|${DB_SECRET_ARN}|g" \
            -e "s|<AWS_REGION>|${{ secrets.AWS_REGION }}|g" \
            taskdef.json > taskdef-filled.json
          mv taskdef-filled.json taskdef.json
          zip bundle.zip appspec.yaml taskdef.json
          aws s3 cp bundle.zip s3://${ARTIFACTS_BUCKET}/deploy-bundle/bundle.zip
